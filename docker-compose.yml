services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kukfin
      POSTGRES_USER: kukfin
      POSTGRES_PASSWORD: kukfin_dev
    ports:
      - "5432:5432"
    volumes:
      - kukfin_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kukfin -d kukfin"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://kukfin:kukfin_dev@postgres:5432/kukfin
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: local-development-secret-change-before-deployment
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  kukfin_postgres:
